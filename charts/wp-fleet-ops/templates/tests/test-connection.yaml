apiVersion: v1
kind: Pod
metadata:
  name: '{{ include "wp-fleet-ops.fullname" . }}-test-connection'
  labels:
    helm.sh/chart: '{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}'
    app.kubernetes.io/component: helm-test
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['-qO-', 'http://{{ include "wp-fleet-ops.fullname" . }}:{{ .Values.service.port }}/health']
