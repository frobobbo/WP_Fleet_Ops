apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "wp-fleet-ops.fullname" . }}-test-connection"
  labels:
    {{- include "wp-fleet-ops.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['-qO-', 'http://{{ include "wp-fleet-ops.fullname" . }}:{{ .Values.service.port }}/health']
