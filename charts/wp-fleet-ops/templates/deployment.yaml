apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wp-fleet-ops.fullname" . }}
  labels:
    {{- include "wp-fleet-ops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wp-fleet-ops.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "wp-fleet-ops.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "wp-fleet-ops.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.sourceBundle.enabled }}
      initContainers:
        - name: unpack-source
          image: {{ .Values.sourceBundle.pythonImage | quote }}
          command: ["/bin/sh", "-lc"]
          args:
            - {{ .Values.sourceBundle.prepareCommand | quote }}
          volumeMounts:
            - name: source-bundle
              mountPath: /bundle
              readOnly: true
            - name: source-work
              mountPath: {{ .Values.sourceBundle.mountPath | quote }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ ternary .Values.sourceBundle.pythonImage (printf "%s:%s" .Values.image.repository (.Values.image.tag | default .Chart.AppVersion)) .Values.sourceBundle.enabled | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.sourceBundle.enabled }}
          workingDir: {{ .Values.sourceBundle.mountPath | quote }}
          command: ["/bin/sh", "-lc"]
          args:
            - {{ .Values.sourceBundle.runCommand | quote }}
          {{- end }}
          env:
            - name: WP_FLEET_OPS_DATA_DIR
              value: {{ .Values.config.dataDir | quote }}
            {{- if .Values.sourceBundle.enabled }}
            - name: WP_FLEET_OPS_TEMPLATE_DIR
              value: {{ printf "%s/app/templates" .Values.sourceBundle.mountPath | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir | quote }}
            {{- if .Values.sourceBundle.enabled }}
            - name: source-work
              mountPath: {{ .Values.sourceBundle.mountPath | quote }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "wp-fleet-ops.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.sourceBundle.enabled }}
        - name: source-bundle
          configMap:
            name: {{ required "sourceBundle.configMapName is required when sourceBundle.enabled=true" .Values.sourceBundle.configMapName | quote }}
        - name: source-work
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
