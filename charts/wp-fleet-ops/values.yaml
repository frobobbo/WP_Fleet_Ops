replicaCount: 1

image:
  repository: ghcr.io/frobobbo/wp_fleet_ops
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 100
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: wp-fleet-ops.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClass: ""

config:
  dataDir: /data

# Development/bootstrapping mode for clusters where the final app image has
# not been pushed yet. Create a ConfigMap containing app.tar.gz and set this to
# true; the chart will unpack and run the source with a stock Python image.
sourceBundle:
  enabled: false
  configMapName: ""
  fileName: app.tar.gz
  mountPath: /work
  pythonImage: python:3.13-slim
  prepareCommand: "mkdir -p /work/app /work/site && tar -xzf /bundle/app.tar.gz -C /work/app && chmod -R a+rX /work/app && python -m pip install --no-cache-dir --target /work/site /work/app && chmod -R a+rX /work/site"
  runCommand: "PYTHONPATH=/work/site:/work/app python -m uvicorn wp_fleet_ops.main:app --host 0.0.0.0 --port 8000"

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
